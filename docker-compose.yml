# ============================================================
# LG_Project 배포 구성
#   app    : Streamlit 웹앱
#   ollama : 사내/로컬 LLM 서버
# 실행: docker compose up -d --build
# ============================================================
services:
  app:
    build: .
    container_name: lgproject-app
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      # 컨테이너 간 통신은 서비스명으로
      - OLLAMA_URL=http://ollama:11434
    volumes:
      - ./data:/app/data        # 업로드/리포트/벡터DB/SQLite 영속화
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: lgproject-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama   # 받은 모델 영속화
    restart: unless-stopped
    # GPU 사용 시 아래 주석 해제 (NVIDIA Container Toolkit 필요)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # PostgreSQL 전환 시 주석 해제하고 .env의 DB_URL 변경
  # db:
  #   image: postgres:16
  #   container_name: lgproject-db
  #   environment:
  #     POSTGRES_USER: lguser
  #     POSTGRES_PASSWORD: change-me
  #     POSTGRES_DB: lgproject
  #   volumes:
  #     - pg_data:/var/lib/postgresql/data
  #   restart: unless-stopped

volumes:
  ollama_models:
