# ============================================================
# LG_Project 배포 구성
#   backend  : FastAPI (분석/판정/RAG/리포트)
#   frontend : React 빌드 → nginx
#   qwen     : Qwen LLM 서버 (Ollama, OpenAI 호환)
# 실행: docker compose up -d --build
# ============================================================
services:
  backend:
    build: ./backend
    container_name: lgproject-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - LLM_BASE_URL=http://qwen:11434/v1
      - LLM_MODEL=qwen2.5:7b
    volumes:
      - ./backend/data:/app/data
    depends_on:
      - qwen
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: lgproject-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

  qwen:
    image: ollama/ollama:latest
    container_name: lgproject-qwen
    ports:
      - "11434:11434"
    volumes:
      - qwen_models:/root/.ollama
    restart: unless-stopped
    # GPU 사용 시 주석 해제 (NVIDIA Container Toolkit 필요)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # PostgreSQL 전환 시 주석 해제 + backend/.env의 DB_URL 변경
  # db:
  #   image: postgres:16
  #   environment:
  #     POSTGRES_USER: lguser
  #     POSTGRES_PASSWORD: change-me
  #     POSTGRES_DB: lgproject
  #   volumes:
  #     - pg_data:/var/lib/postgresql/data

volumes:
  qwen_models:
