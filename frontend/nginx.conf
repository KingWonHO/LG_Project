server {
    listen 80;
    server_name _;

    # API 프록시 → backend 컨테이너
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA 라우팅
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}
